<!DOCTYPE html>
<html>
<head>
    <title>{{ course.title }}</title>

    <style>

        body{
            background:#f4f7fc;
            font-family:Arial,sans-serif;
        }

        .container{
            width:80%;
            max-width:900px;
            margin:50px auto;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#2563eb;
            margin-bottom:30px;
        }

        li{
            font-size:20px;
            margin:15px 0;
        }

        .btn{
            display:block;
            width:220px;
            margin:30px auto;
            text-align:center;
            background:#2563eb;
            color:white;
            text-decoration:none;
            padding:15px;
            border-radius:10px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>{{ course.title }}</h1>

    <h2>Topics Covered</h2>

    <ul>

        {% for topic in course.topics %}
        <li>{{ topic }}</li>
        {% endfor %}

    </ul>

    <a href="/learning" class="btn">
        Back to Learning
    </a>

</div>

</body>
</html>
