<!DOCTYPE html>
<html>

<head>

<title>Settings - SmartHire</title>


<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f6ff;
}


.navbar {

    background: #1a237e;
    padding: 15px;
    text-align: center;

}


.navbar a {

    color: white;
    text-decoration: none;
    margin: 20px;
    font-size: 18px;

}




.container {

    width: 80%;
    margin: auto;
    text-align: center;
    padding-top: 40px;

}




h1 {

    color: #1a237e;

}





.settings-card {

    background: white;
    width: 60%;
    margin: 25px auto;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0px 0px 12px gray;
    text-align: center;

}




.settings-card h2 {

    color: #1565c0;

}




.form-group {

    margin: 20px;

}




label {

    display: block;
    font-size: 17px;
    margin-bottom: 8px;

}




input, select {

    width: 70%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid gray;
    font-size: 16px;

}





.toggle {

    font-size: 18px;

}




.btn {

    display: inline-block;
    background: #1565c0;
    color: white;
    padding: 12px 35px;
    border-radius: 25px;
    text-decoration: none;
    margin-top: 15px;
    border: none;
    cursor: pointer;

}



.btn:hover {

    background: #0d47a1;

}




.danger {

    background: #d32f2f;

}


.danger:hover {

    background: #b71c1c;

}



</style>


</head>



<body>



<div class="navbar">


<a href="/">Home</a>
<a href="/profile">Profile</a>
<a href="/jobs">Jobs</a>
<a href="/roadmap">Roadmap</a>
<a href="/learning">Learning</a>
<a href="/achievements">Achievements</a>
<a href="/notifications">Notifications</a>
<a href="/settings">Settings</a>
<a href="/logout">Logout</a>


</div>







<div class="container">



<h1>Account Settings</h1>






<div class="settings-card">



<h2>Profile Settings</h2>




<div class="form-group">

<label>Name</label>

<input type="text" placeholder="Enter your name">

</div>





<div class="form-group">

<label>Email</label>

<input type="email" placeholder="Enter your email">

</div>





<div class="form-group">

<label>Career Interest</label>


<select>

<option>Machine Learning</option>
<option>Python Developer</option>
<option>Data Analyst</option>
<option>Web Developer</option>

</select>


</div>







<div class="form-group">

<label>Password</label>

<input type="password" placeholder="Change password">

</div>





<button class="btn">
Save Changes
</button>



</div>









<div class="settings-card">



<h2>Notification Settings</h2>



<div class="toggle">


<input type="checkbox" checked>

Receive Job Notifications


</div>



<br>


<div class="toggle">


<input type="checkbox" checked>

Learning Updates


</div>



<br>


<div class="toggle">


<input type="checkbox">

Email Alerts


</div>



</div>








<div class="settings-card">



<h2>Account Actions</h2>



<p>
Manage your SmartHire account.
</p>



<a class="btn danger" href="/logout">
Logout Account
</a>



</div>







</div>




</body>

</html>
