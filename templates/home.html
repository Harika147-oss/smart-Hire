<!DOCTYPE html>
<html>
<head>
    <title>SmartHire - Home</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#2563eb,#1e40af);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:90%;
            max-width:1200px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            color:white;
        }

        .content{
            width:50%;
        }

        .content h1{
            font-size:60px;
            margin-bottom:20px;
        }

        .content p{
            font-size:22px;
            margin-bottom:30px;
            line-height:1.6;
        }

        .buttons{
            display:flex;
            gap:20px;
        }

        .btn{
            text-decoration:none;
            padding:15px 35px;
            border-radius:10px;
            color:white;
            font-size:18px;
            font-weight:bold;
        }

        .login{
            background:#2563eb;
        }

        .signup{
            background:#16a34a;
        }

        .btn:hover{
            opacity:0.9;
        }

        .image-section{
            width:45%;
            text-align:right;
        }

        .student-img{
            width:450px;
            max-width:100%;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="content">

        <h1>SmartHire</h1>

        <p>
            AI Powered Resume Analysis, Job Recommendation,
            Skill Gap Detection, Career Roadmap and Online
            Assessment Platform.
        </p>

        <div class="buttons">

            <a href="/login" class="btn login">
                Login
            </a>

            <a href="/signup" class="btn signup">
                Sign Up
            </a>

        </div>

    </div>

    <div class="image-section">

        <img src="{{ url_for('static', filename='student.png') }}"
             alt="Student"
             class="student-img">

    </div>

</div>

</body>
</html>
