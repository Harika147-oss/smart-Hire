<!DOCTYPE html>
<html>
<head>
    <title>Upload Resume</title>

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f7fc;
            font-family:Arial, sans-serif;
        }

        .container{
            width:450px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.15);
            text-align:center;
        }

        h1{
            color:#2563eb;
            margin-bottom:25px;
        }

        input[type="file"]{
            margin:20px 0;
            width:100%;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        .back-btn{
            display:inline-block;
            margin-top:15px;
            text-decoration:none;
            color:#2563eb;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>📄 Upload Your Resume</h1>

    <form method="POST" enctype="multipart/form-data">

        <input type="file" name="resume" required>

        <br>

        <button type="submit">
            Upload Resume
        </button>

    </form>

    <br>

    <a href="/dashboard" class="back-btn">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
