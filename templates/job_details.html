<!DOCTYPE html>
<html>
<head>
    <title>{{ job.title }} - SmartHire</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f7fc;
        }

        .container{
            width:80%;
            max-width:900px;
            margin:60px auto;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#2563eb;
            margin-bottom:30px;
        }

        .info{
            margin:15px 0;
            font-size:20px;
        }

        .label{
            font-weight:bold;
            color:#1e3a8a;
        }

        .apply-btn{
            display:block;
            width:220px;
            margin:30px auto;
            text-align:center;
            background:#16a34a;
            color:white;
            text-decoration:none;
            padding:15px;
            border-radius:10px;
            font-size:18px;
        }

        .apply-btn:hover{
            background:#15803d;
        }

        .back-btn{
            display:block;
            width:220px;
            margin:10px auto;
            text-align:center;
            background:#2563eb;
            color:white;
            text-decoration:none;
            padding:15px;
            border-radius:10px;
            font-size:18px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>{{ job.title }}</h1>

    <div class="info">
        <span class="label">Company:</span>
        {{ job.company }}
    </div>

    <div class="info">
        <span class="label">Location:</span>
        {{ job.location }}
    </div>

    <div class="info">
        <span class="label">Salary:</span>
        {{ job.salary }}
    </div>

    <div class="info">
        <span class="label">Description:</span>
        {{ job.description }}
    </div>

    <a href="#" class="apply-btn">
        Apply For Job
    </a>

    <a href="/jobs" class="back-btn">
        Back to Jobs
    </a>

</div>

</body>
</html>
