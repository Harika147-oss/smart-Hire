<!DOCTYPE html>
<html>

<head>

<title>Signup - SmartHire</title>


<style>

body{

    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f2f6ff;
    font-family:Arial;

}



.signup-box{

    width:350px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0px 0px 15px gray;
    text-align:center;

}



h1{

color:#1a237e;

}



input{

    width:90%;
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:1px solid gray;

}



button{

    width:95%;
    padding:12px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:25px;
    font-size:17px;

}



button:hover{

background:#0d47a1;

}


a{

color:#1565c0;
text-decoration:none;

}


</style>


</head>



<body>



<div class="signup-box">


<h1>SmartHire</h1>


<h2>Create Account</h2>



<form method="POST">


<input
type="text"
name="name"
placeholder="Enter Name"
required>



<input
type="email"
name="email"
placeholder="Enter Email"
required>



<input
type="password"
name="password"
placeholder="Enter Password"
required>



<button>
Signup
</button>



</form>



<p>
Already have account?
<a href="/login">
Login
</a>
</p>



</div>



</body>


</html>
